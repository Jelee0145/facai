# 使用前需先创建 ./backend/Dockerfile 和 ./Dockerfile（项目根目录）
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: ./backend/.env
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "5000:5000"
    environment:
      BACKEND_URL: http://backend:8001
    depends_on:
      - backend
    restart: unless-stopped
