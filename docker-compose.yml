services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8001:8001"
    env_file: ./backend/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:4524}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - ./backend/data.db:/app/data.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4524:4524"
    env_file: ./backend/.env
    environment:
      - BACKEND_URL=http://backend:8001
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
